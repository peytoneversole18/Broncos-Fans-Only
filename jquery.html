<div id="contentArea">

  <!-- your stuff -->
  <button id="hideBtn">Show / Hide Box</button>
  <button id="textBtn">Change Text</button>
  <div id="box">4 days away from the NFL Draft 👀</div>

</div>

<button id="hideAllBtn">Hide Section</button>


<script>
  $("#hideBtn").click(function() {
    $("#box").toggle();
  });
</script>


<script>
  let changed = false;

  $("#textBtn").click(function() {
    if (changed) {
      $("#box").html("4 days away from the NFL Draft 👀");
    } else {
      $("#box").html("<strong> 5 days until the Broncos pick...<strong>");
    }
    changed = !changed;
  });
</script>

<script>
  $("#hideAllBtn").click(function() {
    $("#contentArea").toggle();
  });
</script>
